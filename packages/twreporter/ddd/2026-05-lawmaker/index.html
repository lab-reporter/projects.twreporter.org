  <body style="background-color: #f1f1f1">
    <script type="module" src="/src/main.ts"></script>

    <h1>文字雲</h1>
    <twreporter-wordcloud key="A03"></twreporter-wordcloud>
    <twreporter-wordcloud key="A06"></twreporter-wordcloud>
    <twreporter-wordcloud key="A08"></twreporter-wordcloud>

    <div class="spacer"></div>

    <h1>長條圖</h1>
    <twreporter-bar key="B01"></twreporter-bar>
    
    <div class="spacer"></div>

    <h1>表格（單一）</h1>
    <twreporter-table key="T01"></twreporter-table>

    <div class="spacer"></div>

    <h1>Embeddings 圖表</h1>
    <twreporter-embeddings key="E01"></twreporter-embeddings>

    <div class="spacer"></div>

    <style>
      h1 {
        height: 20px;
      }

      .spacer {
        height: 30vh;
      }
    </style>

    <!--
            Embed code style snippet, see
            https://github.com/lab-reporter/storytelling-monorepo/blob/f0d3e92e6fa13020d02728b3586ee6ca7f05ceb5/packages/cms/migrations/20240305071659_update_scrollable_video_list/migration.sql
            for latest definition
        -->
    <style>
      :root {
        --body-width: calc(300 / 375 * 100%);
      }

      @media (max-width: 767px) {
        :root {
          --body-width: 93.2vw;
        }
      }
      @media (min-width: 768px) and (max-width: 1023px) {
        :root {
          --body-width: 512px;
        }
      }

      @media (min-width: 1024px) and (max-width: 1439px) {
        :root {
          --body-width: 550px;
        }
      }

      @media (min-width: 1440px) {
        :root {
          --body-width: 730px;
        }
      }

      .embed-code-container {
        width: 100vw;
        margin-left: calc((100vw - var(--body-width)) / 2 * -1);
      }
    </style>
  </body>
