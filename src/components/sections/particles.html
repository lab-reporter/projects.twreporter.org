<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 滾動觸發粒子模型 (OBJ Loader - 填滿)</title>
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            /* 防止水平滾動 */
            background-color: #000;
            color: #fff;
            font-family: "Inter", sans-serif;
        }

        /* 將 canvas 固定在背景，使其不隨頁面滾動 */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
        }

        /* 建立一個滾動容器來觸發滾動事件 */
        .scroll-container {
            /* 200vh = 100vh (canvas 顯示區域) + 100vh (觸發動畫的滾動距離) */
            height: 200vh;
        }

        #info {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: block;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            transition: opacity 0.5s ease;
            pointer-events: none;
            /* 讓滑鼠可以穿透提示文字 */
        }

        /* 確保 GUI 在最上層 */
        .dg.main {
            z-index: 999 !important;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
</head>

<body>
    <canvas id="webgl-canvas"></canvas>
    <div class="scroll-container"></div>
    <div id="info">請向下滾動頁面</div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GUI } from "three/addons/libs/lil-gui.module.min.js";
        import { OBJLoader } from "three/addons/loaders/OBJLoader.js";

        const modelURL = "assets/speaker.obj";

        let scene, camera, renderer, controls;
        let points;
        let gui;
        // --- CHANGE: 新增一個變數來存放用於射線投射的模型網格 ---
        let modelMesh = null;

        const params = {
            particleCount: 10000,
            particleSize: 0.1,
            randomMovement: 0.297,
            initialSpread: 20,
            regenerate: () => createParticles(),
        };

        // Shaders remain the same
        const vertexShader = `
            attribute vec3 targetPosition;
            attribute vec3 initialPosition;
            attribute float randomValue;
            uniform float uTime;
            uniform float uRandomMovement;
            uniform float uParticleSize;
            uniform float uProgress;

            void main() {
                vec3 interpolatedPosition = mix(initialPosition, targetPosition, uProgress);
                float moveFactor = sin(uTime * 0.5 + randomValue * 10.0) * uRandomMovement;
                vec3 randomOffset = vec3(
                    sin(uTime * randomValue),
                    cos(uTime * randomValue * 0.8),
                    sin(uTime * randomValue * 1.2)
                ) * moveFactor;
                
                vec3 finalPosition = interpolatedPosition + randomOffset;
                vec4 modelViewPosition = modelViewMatrix * vec4(finalPosition, 1.0);
                gl_Position = projectionMatrix * modelViewPosition;
                gl_PointSize = uParticleSize * ( 300.0 / -modelViewPosition.z );
            }
        `;

        const fragmentShader = `
            void main() {
                gl_FragColor = vec4(0.3, 0.7, 1.0, 1.0);
            }
        `;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0, 15);
            camera.lookAt(scene.position);

            const canvas = document.getElementById("webgl-canvas");
            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true,
                alpha: true,
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = false;

            loadModel();

            window.addEventListener("resize", onWindowResize, false);
            window.addEventListener("scroll", onScroll, false);

            animate();
        }

        // --- CHANGE: 修改載入邏輯，保存網格並進行變換 ---
        function loadModel() {
            const loader = new OBJLoader();
            const infoElement = document.getElementById("info");

            loader.load(
                modelURL,
                (object) => {
                    // 尋找第一個有效的網格 (Mesh) 並儲存它
                    object.traverse((child) => {
                        if (child.isMesh && !modelMesh) {
                            modelMesh = child;
                        }
                    });

                    if (!modelMesh) {
                        console.error("在 .obj 檔案中找不到網格。");
                        infoElement.innerText = "模型載入失敗：找不到網格。";
                        return;
                    }

                    // 計算模型的邊界框以進行置中和縮放
                    const box = new THREE.Box3().setFromObject(modelMesh);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 10.0 / maxDim;

                    // 直接對網格物件進行變換，而不是只處理頂點
                    // 這樣射線投射才能在正確的座標空間運作
                    modelMesh.position.sub(center);
                    modelMesh.scale.setScalar(scale);

                    // 非常重要：更新網格的世界矩陣，讓射線投射能使用新的變換
                    modelMesh.updateMatrixWorld(true);

                    // 我們只需要這個網格來計算位置，不需要顯示它
                    modelMesh.visible = false;
                    scene.add(modelMesh);

                    createParticles();
                    setupGUI();

                    infoElement.innerText = "請向下滾動頁面";
                },
                (xhr) => {
                    const percentLoaded = ((xhr.loaded / xhr.total) * 100).toFixed(2);
                    infoElement.innerText = `正在載入模型... ${percentLoaded}%`;
                },
                (error) => {
                    console.error("模型載入失敗:", error);
                    infoElement.innerText = "模型載入失敗，請檢查控制台。";
                }
            );
        }

        // --- CHANGE: 修改粒子生成邏輯，使用射線投射法填滿模型內部 ---
        function createParticles() {
            if (points) {
                scene.remove(points);
                points.geometry.dispose();
                points.material.dispose();
            }

            // 確認模型網格已載入
            if (!modelMesh) return;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(params.particleCount * 3);
            const initialPositions = new Float32Array(params.particleCount * 3);
            const targetPositions = new Float32Array(params.particleCount * 3);
            const randomValues = new Float32Array(params.particleCount);

            // 取得變換後網格的邊界框
            const boundingBox = new THREE.Box3().setFromObject(modelMesh);
            const raycaster = new THREE.Raycaster();
            // 使用一個固定的方向進行射線投射
            const direction = new THREE.Vector3(1, 0, 0);

            for (let i = 0; i < params.particleCount; i++) {
                const i3 = i * 3;

                let randomPoint;
                let pointIsInside = false;

                // 不斷嘗試，直到找到一個在模型內部的點
                while (!pointIsInside) {
                    // 在模型的邊界框內生成一個隨機點
                    randomPoint = new THREE.Vector3(
                        THREE.MathUtils.randFloat(boundingBox.min.x, boundingBox.max.x),
                        THREE.MathUtils.randFloat(boundingBox.min.y, boundingBox.max.y),
                        THREE.MathUtils.randFloat(boundingBox.min.z, boundingBox.max.z)
                    );

                    // 設定射線的起點和方向
                    raycaster.set(randomPoint, direction);
                    const intersects = raycaster.intersectObject(modelMesh, false);

                    // 如果射線與模型的交點數量為奇數，代表點在模型內部
                    if (intersects.length % 2 === 1) {
                        pointIsInside = true;
                    }
                }

                // 找到內部點，將其設為目標位置
                targetPositions[i3] = randomPoint.x;
                targetPositions[i3 + 1] = randomPoint.y;
                targetPositions[i3 + 2] = randomPoint.z;

                // 粒子的初始位置邏輯保持不變 (從球體散開)
                let x, y, z, d2;
                do {
                    x = Math.random() * 2.0 - 1.0;
                    y = Math.random() * 2.0 - 1.0;
                    z = Math.random() * 2.0 - 1.0;
                    d2 = x * x + y * y + z * z;
                } while (d2 > 1.0);

                initialPositions[i3] = x * params.initialSpread;
                initialPositions[i3 + 1] = y * params.initialSpread;
                initialPositions[i3 + 2] = z * params.initialSpread;

                randomValues[i] = Math.random();
            }

            geometry.setAttribute(
                "position",
                new THREE.BufferAttribute(positions, 3)
            );
            geometry.setAttribute(
                "initialPosition",
                new THREE.BufferAttribute(initialPositions, 3)
            );
            geometry.setAttribute(
                "targetPosition",
                new THREE.BufferAttribute(targetPositions, 3)
            );
            geometry.setAttribute(
                "randomValue",
                new THREE.BufferAttribute(randomValues, 1)
            );

            const material = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms: {
                    uTime: { value: 0.0 },
                    uRandomMovement: { value: params.randomMovement },
                    uParticleSize: { value: params.particleSize },
                    uProgress: { value: window.scrollY / window.innerHeight },
                },
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        function setupGUI() {
            if (gui) {
                gui.destroy();
            }
            gui = new GUI();
            gui
                .add(params, "particleCount", 10000, 200000, 1000)
                .name("粒子數量")
                .onFinishChange(params.regenerate);
            gui
                .add(params, "particleSize", 0.1, 5, 0.1)
                .name("粒子大小")
                .onChange((v) => {
                    if (points) points.material.uniforms.uParticleSize.value = v;
                });
            gui
                .add(params, "randomMovement", 0, 0.5, 0.001)
                .name("隨機移動")
                .onChange((v) => {
                    if (points) points.material.uniforms.uRandomMovement.value = v;
                });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onScroll() {
            const scrollY = window.scrollY;
            let progress = scrollY / window.innerHeight;
            progress = Math.min(Math.max(progress, 0.0), 1.0);

            if (points) {
                points.material.uniforms.uProgress.value = progress;
            }

            const infoElement = document.getElementById("info");
            if (scrollY > 50) {
                infoElement.style.opacity = "0";
            } else {
                infoElement.style.opacity = "1";
            }
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (points) {
                points.material.uniforms.uTime.value = elapsedTime;
            }

            if (controls) controls.update();

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>

</html>
